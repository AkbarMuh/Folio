<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>404 // TARGET NOT FOUND — Akbar Prakoso</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Page not found." name="description">
    <meta name="robots" content="noindex">

    <!-- Favicon: inline SVG (red Phantom star) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0a'/%3E%3Cpath d='M16 3L19.06 11.79L28.36 11.98L20.95 17.61L23.64 26.52L16 21.2L8.36 26.52L11.05 17.61L3.64 11.98L12.94 11.79Z' fill='%23e60012'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@1,600;1,700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --red: #e60012; --ink: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Barlow', sans-serif; background: var(--ink); color: #fff;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(115deg, rgba(230,0,18,.9) 0 60px, rgba(179,0,14,.9) 60px 120px);
            z-index: 0;
        }
        body::after {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(0,0,0,.35) 2px, transparent 2.2px);
            background-size: 14px 14px; mix-blend-mode: multiply; opacity: .5; z-index: 0;
        }
        .box { position: relative; z-index: 2; }
        .code {
            font-family: 'Anton', sans-serif; line-height: .85; letter-spacing: 2px;
            font-size: clamp(6rem, 30vw, 18rem); -webkit-text-stroke: 3px #000;
            transform: skewX(-8deg); text-transform: uppercase;
            animation: punch .7s cubic-bezier(.2,1.4,.4,1) both;
        }
        @keyframes punch { 0% { opacity: 0; transform: skewX(-8deg) scale(2.2); } 60% { opacity: 1; transform: skewX(-8deg) scale(1.05); } 100% { transform: skewX(-8deg) scale(1); } }
        .tag {
            display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-style: italic; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; font-size: clamp(1.1rem, 4vw, 2rem);
            background: var(--ink); color: #fff; padding: 6px 22px; transform: skewX(-8deg);
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); margin-bottom: 10px;
        }
        .sub { font-size: 1.05rem; margin: 18px 0 30px; opacity: .95; }
        .home {
            font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-style: italic; text-transform: uppercase;
            letter-spacing: 1.5px; font-size: 1.1rem; text-decoration: none; color: var(--ink);
            background: #fff; padding: 13px 26px; transform: skewX(-10deg); display: inline-block;
            border: 3px solid var(--ink); box-shadow: 6px 6px 0 var(--ink); transition: transform .15s, background .2s, color .2s;
        }
        .home span { display: inline-block; transform: skewX(10deg); }
        .home:hover { background: var(--ink); color: #fff; transform: skewX(-10deg) translate(-2px,-2px); box-shadow: 9px 9px 0 rgba(0,0,0,.6); }
        @media (prefers-reduced-motion: reduce) { .code { animation: none; } }
    </style>
</head>

<body>
    <div class="box">
        <div class="tag">Target Not Found</div>
        <div class="code">404</div>
        <p class="sub">This treasure isn't in the Palace. The page you're after doesn't exist or has moved.</p>
        <a class="home" href="index.html"><span>← Return to Hideout</span></a>
    </div>
</body>

</html>
